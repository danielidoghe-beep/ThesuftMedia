<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ThesuftMedia</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-page">

    <img src="logo.png.jpg" class="login-logo" alt="ThesuftMedia">

    <h1>Welcome back</h1>

    <p class="subtitle">
        Sign in to your ThesuftMedia account
    </p>

    <button id="googleLogin" class="google-btn">

        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon">

        Continue with Google

    </button>

    <div class="divider">

        <span></span>

        <p>or continue with email</p>

        <span></span>

    </div>

    <form id="loginForm">

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
        >

        <div class="password-header">

            <label>Password</label>

            <a href="#" id="forgotPassword">
                Forgot password?
            </a>

        </div>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
            >

            <button
                type="button"
                id="togglePassword"
                class="eye-btn">

                👁

            </button>

        </div>

        <button
            type="submit"
            class="signin-btn">

            Sign in

        </button>

    </form>

    <p class="bottom-text">

        No account?

        <a href="signup.html">

            Create one free

        </a>

    </p>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
